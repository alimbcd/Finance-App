<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مدیریت مالی شخصی</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* متغیرهای تم روشن (پیش‌فرض) */
        :root {
            --bg-color: #f2f2f7;
            --text-color: #000000;
            --card-bg: rgba(255, 255, 255, 0.7);
            --nav-bg: rgba(255, 255, 255, 0.85);
            --primary: #007aff;
            --income: #34c759;
            --expense: #ff3b30;
            --border: rgba(0, 0, 0, 0.1);
        }

        /* تم تاریک */
        body.theme-dark {
            --bg-color: #000000;
            --text-color: #ffffff;
            --card-bg: rgba(28, 28, 30, 0.7);
            --nav-bg: rgba(28, 28, 30, 0.85);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* تم اقیانوسی */
        body.theme-ocean {
            --bg-color: #001f3f;
            --text-color: #e0f7fa;
            --card-bg: rgba(0, 51, 102, 0.7);
            --nav-bg: rgba(0, 51, 102, 0.85);
            --primary: #00a8ff;
            --border: rgba(255, 255, 255, 0.1);
        }

        /* تم طبیعت */
        body.theme-nature {
            --bg-color: #f1f8e9;
            --text-color: #33691e;
            --card-bg: rgba(220, 237, 200, 0.7);
            --nav-bg: rgba(220, 237, 200, 0.85);
            --primary: #558b2f;
            --income: #2e7d32;
            --expense: #c62828;
            --border: rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Vazirmatn', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            padding-bottom: 80px; /* فضای نوار ناوبری */
        }

        /* استایل Glassmorphism */
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .header {
            padding: 20px 15px 10px;
            font-size: 24px;
            font-weight: bold;
        }

        .balance-card {
            text-align: center;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
            direction: ltr;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        .stat-item {
            text-align: center;
            flex: 1;
        }
        
        .stat-item.income { color: var(--income); }
        .stat-item.expense { color: var(--expense); }

        .section-title {
            margin: 20px 15px 10px;
            font-size: 18px;
            font-weight: bold;
        }

        /* لیست تراکنش‌ها */
        .tx-list {
            list-style: none;
            padding: 0 15px;
        }

        .tx-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--card-bg);
            border-radius: 15px;
            margin-bottom: 10px;
        }

        .tx-info h4 { font-size: 16px; margin-bottom: 5px; }
        .tx-info p { font-size: 12px; opacity: 0.7; }
        .tx-amount { font-weight: bold; direction: ltr;}

        /* فرم‌ها و کنترل‌ها */
        .segmented-control {
            display: flex;
            background: var(--border);
            border-radius: 10px;
            padding: 3px;
            margin-bottom: 15px;
        }

        .segmented-control label {
            flex: 1;
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .segmented-control input { display: none; }
        .segmented-control input:checked + label {
            background: var(--primary);
            color: white;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; }
        
        input[type="text"], input[type="tel"], select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
        }

        .date-picker-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* نوار ناوبری پایین */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            padding-bottom: env(safe-area-inset-bottom, 10px);
            z-index: 1000;
        }

        .nav-item {
            text-align: center;
            cursor: pointer;
            opacity: 0.5;
            transition: 0.3s;
        }
        .nav-item.active { opacity: 1; color: var(--primary); }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; margin-bottom: 3px; }
        .nav-item span { display: block; font-size: 10px; }

        /* مدیریت تب‌ها */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        canvas { max-width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

    <!-- تب داشبورد -->
    <div id="tab-dashboard" class="tab-content active">
        <div class="header">نمای کلی</div>
        
        <div class="glass balance-card">
            <div>موجودی کل</div>
            <div class="balance-amount" id="total-balance">0 تومان</div>
            <div class="stats">
                <div class="stat-item income">
                    <div>درآمد</div>
                    <div id="total-income" style="direction:ltr;">0</div>
                </div>
                <div class="stat-item expense">
                    <div>هزینه</div>
                    <div id="total-expense" style="direction:ltr;">0</div>
                </div>
            </div>
        </div>

        <div class="glass">
            <canvas id="dashboardChart"></canvas>
        </div>

        <div class="section-title">تراکنش‌های اخیر</div>
        <ul class="tx-list" id="recent-tx-list">
            <!-- لیست با جاوا اسکریپت پر می‌شود -->
        </ul>
    </div>

    <!-- تب افزودن تراکنش -->
    <div id="tab-add" class="tab-content">
        <div class="header">ثبت تراکنش</div>
        <div class="glass">
            <form id="add-form">
                <div class="segmented-control">
                    <input type="radio" id="type-expense" name="tx-type" value="expense" checked onchange="updateCategories()">
                    <label for="type-expense">هزینه</label>
                    <input type="radio" id="type-income" name="tx-type" value="income" onchange="updateCategories()">
                    <label for="type-income">درآمد</label>
                </div>

                <div class="form-group">
                    <label>مبلغ (تومان)</label>
                    <input type="tel" id="tx-amount" required placeholder="مثال: 50000" oninput="formatAmountInput(this)">
                </div>

                <div class="form-group">
                    <label>دسته‌بندی</label>
                    <select id="tx-category" required></select>
                </div>

                <div class="form-group">
                    <label>تاریخ</label>
                    <div class="date-picker-group">
                        <select id="tx-day"></select>
                        <select id="tx-month"></select>
                        <select id="tx-year"></select>
                    </div>
                </div>

                <div class="form-group">
                    <label>توضیحات (اختیاری)</label>
                    <input type="text" id="tx-note" placeholder="بابت...">
                </div>

                <button type="submit" class="btn">ثبت تراکنش</button>
            </form>
        </div>
    </div>

    <!-- تب گزارش‌ها -->
    <div id="tab-reports" class="tab-content">
        <div class="header">گزارش‌ها</div>
        <div class="glass">
            <div class="form-group">
                <label>بازه زمانی</label>
                <select id="r-period" onchange="generateReport()">
                    <option value="month">ماه جاری</option>
                    <option value="year">سال جاری</option>
                </select>
            </div>
            
            <div class="stats" style="margin-bottom: 20px;">
                <div class="stat-item income">
                    <div>مجموع درآمد</div>
                    <div id="report-income" style="direction:ltr;">0</div>
                </div>
                <div class="stat-item expense">
                    <div>مجموع هزینه</div>
                    <div id="report-expense" style="direction:ltr;">0</div>
                </div>
            </div>

            <canvas id="reportChart"></canvas>
        </div>
    </div>

    <!-- تب تنظیمات -->
    <div id="tab-settings" class="tab-content">
        <div class="header">تنظیمات</div>
        <div class="glass">
            <div class="form-group">
                <label>انتخاب پوسته (تم)</label>
                <select id="theme-selector" onchange="changeTheme(this.value)">
                    <option value="light">روشن (iOS)</option>
                    <option value="dark">تاریک (Dark Mode)</option>
                    <option value="ocean">اقیانوسی</option>
                    <option value="nature">طبیعت</option>
                </select>
            </div>
            <button class="btn" style="background:var(--expense); margin-top:20px;" onclick="clearData()">پاک کردن تمام اطلاعات</button>
        </div>
    </div>

    <!-- نوار ناوبری پایین -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('dashboard', this)">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>خانه</span>
        </div>
        <div class="nav-item" onclick="switchTab('add', this)">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            <span>افزودن</span>
        </div>
        <div class="nav-item" onclick="switchTab('reports', this)">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
            <span>گزارش</span>
        </div>
        <div class="nav-item" onclick="switchTab('settings', this)">
            <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 C13.57,21.83,13.77,22,14.01,22h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            <span>تنظیمات</span>
        </div>
    </div>

    <script>
        // --- داده‌ها و تنظیمات اولیه ---
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        
        const expenseCategories = ['مواد غذایی', 'حمل و نقل', 'قبوض', 'پوشاک', 'سرگرمی', 'سایر'];
        const incomeCategories = ['حقوق', 'پاداش', 'سرمایه‌گذاری', 'سایر'];

        let dashChartObj = null;
        let reportChartObj = null;

        // --- توابع کمکی ---
        const toEnglishDigits = (str) => {
            const persianNumbers = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
            const arabicNumbers  = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
            if(typeof str !== 'string') str = str.toString();
            return str.replace(/[۰-۹]/g, w => persianNumbers.indexOf(w))
                      .replace(/[٠-٩]/g, w => arabicNumbers.indexOf(w));
        };

        const getJalaliDate = (dateObj) => {
            return new Intl.DateTimeFormat('fa-IR').format(dateObj);
        };

        // --- مقداردهی اولیه ---
        window.onload = () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.getElementById('theme-selector').value = savedTheme;
            changeTheme(savedTheme);
            
            initDatePickers();
            updateCategories();
            updateDashboard();
        };

        // --- مدیریت رابط کاربری ---
        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            
            document.getElementById('tab-' + tabId).classList.add('active');
            element.classList.add('active');

            if(tabId === 'dashboard') updateDashboard();
            if(tabId === 'reports') generateReport();
        }

        function changeTheme(themeName) {
            document.body.className = '';
            if (themeName !== 'light') {
                document.body.classList.add('theme-' + themeName);
            }
            localStorage.setItem('theme', themeName);
            // رفرش نمودارها برای اعمال رنگ‌ها
            updateDashboard();
            if(document.getElementById('tab-reports').classList.contains('active')) generateReport();
        }

        // --- تب افزودن تراکنش ---
        function updateCategories() {
            const type = document.querySelector('input[name="tx-type"]:checked').value;
            const catSelect = document.getElementById('tx-category');
            catSelect.innerHTML = '';
            
            const cats = type === 'expense' ? expenseCategories : incomeCategories;
            cats.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.innerText = c;
                catSelect.appendChild(opt);
            });
        }

        function initDatePickers() {
            // گرفتن تاریخ امروز شمسی به انگلیسی
            const todayStr = toEnglishDigits(getJalaliDate(new Date()));
            const parts = todayStr.split('/');
            const currentYear = parseInt(parts[0]);
            const currentMonth = parseInt(parts[1]);
            const currentDay = parseInt(parts[2]);

            const daySel = document.getElementById('tx-day');
            const monthSel = document.getElementById('tx-month');
            const yearSel = document.getElementById('tx-year');

            for(let i=1; i<=31; i++) {
                daySel.innerHTML += `<option value="${i.toString().padStart(2, '0')}" ${i===currentDay ? 'selected':''}>${i}</option>`;
            }
            for(let i=1; i<=12; i++) {
                monthSel.innerHTML += `<option value="${i.toString().padStart(2, '0')}" ${i===currentMonth ? 'selected':''}>${i}</option>`;
            }
            for(let i=currentYear-5; i<=currentYear+5; i++) {
                yearSel.innerHTML += `<option value="${i}" ${i===currentYear ? 'selected':''}>${i}</option>`;
            }
        }

        function formatAmountInput(input) {
            // تبدیل به عدد انگلیسی و حذف کاراکترهای غیر عددی
            let val = toEnglishDigits(input.value).replace(/[^0-9]/g, '');
            if(val) {
                // نمایش با جداکننده هزارگان
                input.value = parseInt(val).toLocaleString('en-US');
            } else {
                input.value = '';
            }
        }

        document.getElementById('add-form').onsubmit = (e) => {
            e.preventDefault();
            
            const rawAmount = document.getElementById('tx-amount').value;
            const amount = parseInt(toEnglishDigits(rawAmount).replace(/[^0-9]/g, ''));
            const type = document.querySelector('input[name="tx-type"]:checked').value;
            const category = document.getElementById('tx-category').value;
            const note = document.getElementById('tx-note').value;
            
            const y = document.getElementById('tx-year').value;
            const m = document.getElementById('tx-month').value;
            const d = document.getElementById('tx-day').value;
            const jalaliDateStr = `${y}/${m}/${d}`;

            if (!amount || amount <= 0) {
                alert("مبلغ نامعتبر است!");
                return;
            }

            const newTx = {
                id: Date.now(),
                amount: amount,
                type: type,
                category: category,
                note: note,
                jalaliDate: jalaliDateStr,
                timestamp: new Date().getTime() // برای مرتب‌سازی
            };

            transactions.push(newTx);
            // مرتب سازی نزولی بر اساس زمان ثبت
            transactions.sort((a,b) => b.timestamp - a.timestamp);
            localStorage.setItem('transactions', JSON.stringify(transactions));

            alert('تراکنش با موفقیت ثبت شد!');
            document.getElementById('add-form').reset();
            updateCategories();
            initDatePickers();
        };

        // --- داشبورد ---
        function updateDashboard() {
            let totalIn = 0; let totalEx = 0;
            const listEl = document.getElementById('recent-tx-list');
            listEl.innerHTML = '';

            transactions.forEach((t, index) => {
                if(t.type === 'income') totalIn += t.amount;
                else totalEx += t.amount;

                // نمایش ۵ تراکنش آخر
                if(index < 5) {
                    const li = document.createElement('li');
                    li.className = 'tx-item';
                    const color = t.type === 'income' ? 'var(--income)' : 'var(--expense)';
                    const sign = t.type === 'income' ? '+' : '-';
                    
                    li.innerHTML = `
                        <div class="tx-info">
                            <h4>${t.category}</h4>
                            <p>${t.jalaliDate} ${t.note ? '- '+t.note : ''}</p>
                        </div>
                        <div class="tx-amount" style="color: ${color}">
                            ${sign} ${t.amount.toLocaleString('en-US')}
                        </div>
                    `;
                    listEl.appendChild(li);
                }
            });

            const balance = totalIn - totalEx;
            document.getElementById('total-balance').innerText = balance.toLocaleString('en-US') + ' تومان';
            document.getElementById('total-income').innerText = totalIn.toLocaleString('en-US');
            document.getElementById('total-expense').innerText = totalEx.toLocaleString('en-US');

            renderDashChart(totalIn, totalEx);
        }

        // --- گزارش‌گیری (رفع باگ اعمال شده) ---
        function generateReport() {
            const period = document.getElementById('r-period').value;
            const todayJalali = toEnglishDigits(getJalaliDate(new Date()));
            
            // جداسازی ایمن تاریخ با split
            const todayParts = todayJalali.split('/');
            const currentYear = todayParts[0];
            const currentMonth = todayParts[1] ? todayParts[1].padStart(2, '0') : '';

            let rIncome = 0; let rExpense = 0;
            
            transactions.forEach(t => {
                // خواندن تاریخ تراکنش
                const tDate = t.jalaliDate || toEnglishDigits(getJalaliDate(new Date(t.timestamp)));
                const tParts = tDate.split('/');
                
                if (tParts.length >= 2) {
                    const tYear = tParts[0];
                    const tMonth = tParts[1].padStart(2, '0');

                    let include = false;
                    if(period === 'year' && tYear === currentYear) include = true;
                    if(period === 'month' && tYear === currentYear && tMonth === currentMonth) include = true;

                    if(include) {
                        if(t.type === 'income') rIncome += t.amount;
                        else rExpense += t.amount;
                    }
                }
            });

            document.getElementById('report-income').innerText = rIncome.toLocaleString('en-US');
            document.getElementById('report-expense').innerText = rExpense.toLocaleString('en-US');

            renderReportChart(rIncome, rExpense);
        }

        // --- رسم نمودارها با Chart.js ---
        function getChartColors() {
            const root = getComputedStyle(document.body);
            return {
                text: root.getPropertyValue('--text-color').trim() || '#000',
                income: root.getPropertyValue('--income').trim() || '#34c759',
                expense: root.getPropertyValue('--expense').trim() || '#ff3b30'
            };
        }

        function renderDashChart(income, expense) {
            const ctx = document.getElementById('dashboardChart').getContext('2d');
            const colors = getChartColors();
            
            if(dashChartObj) dashChartObj.destroy();
            
            if(income === 0 && expense === 0) return; // نمودار خالی نکش

            dashChartObj = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['درآمد', 'هزینه'],
                    datasets: [{
                        data: [income, expense],
                        backgroundColor: [colors.income, colors.expense],
                        borderWidth: 0
                    }]
                },
                options: {
                    plugins: {
                        legend: { labels: { color: colors.text, font: {family: 'Vazirmatn'} } }
                    },
                    cutout: '70%'
                }
            });
        }

        function renderReportChart(income, expense) {
            const ctx = document.getElementById('reportChart').getContext('2d');
            const colors = getChartColors();

            if(reportChartObj) reportChartObj.destroy();

            reportChartObj = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['مقایسه درآمد و هزینه'],
                    datasets: [
                        { label: 'درآمد', data: [income], backgroundColor: colors.income },
                        { label: 'هزینه', data: [expense], backgroundColor: colors.expense }
                    ]
                },
                options: {
                    scales: {
                        y: { ticks: { color: colors.text }, grid: {color: 'rgba(128,128,128,0.2)'} },
                        x: { ticks: { color: colors.text }, grid: {display: false} }
                    },
                    plugins: {
                        legend: { labels: { color: colors.text, font: {family: 'Vazirmatn'} } }
                    }
                }
            });
        }

        function clearData() {
            if(confirm('آیا از پاک کردن تمامی اطلاعات مطمئن هستید؟ این کار غیرقابل بازگشت است.')) {
                localStorage.removeItem('transactions');
                transactions = [];
                updateDashboard();
                alert('اطلاعات پاک شد.');
            }
        }
    </script>
